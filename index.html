        // =====================================================================
        // CSV PARSER
        // =====================================================================

        function parseCSVLine(line) {
            const result = [];
            let current = "";
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') {
                    if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
                    else inQuotes = !inQuotes;
                } else if (ch === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = "";
                } else { current += ch; }
            }
            result.push(current.trim());
            return result;
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const headers = parseCSVLine(lines[0]);
            return lines.slice(1).filter(l => l.trim()).map(line => {
                const vals = parseCSVLine(line);
                const row = {};
                headers.forEach((h, i) => row[h.trim()] = (vals[i] || "").trim());
                return row;
            });
        }

        // =====================================================================
        // DATA FETCHING
        // =====================================================================

        function fetchWithTimeout(url, ms = 8000) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), ms);
            return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
        }

        async function fetchSchedule() {
            const resp = await fetchWithTimeout(`${API_BASE}/${SEASON}.json`);
            if (!resp.ok) throw new Error(`Schedule API ${resp.status}`);
            const data = await resp.json();
            return data.MRData.RaceTable.Races.map(race => ({
                round: parseInt(race.round),
                apiName: race.raceName,
                name: RACE_SHORT_NAMES[race.raceName] || race.raceName.replace(/ Grand Prix$/, ""),
                date: race.date,
                time: race.time || null,
                flag: COUNTRY_FLAGS[race.Circuit.Location.country] || "\u{1F3C1}",
                country: race.Circuit.Location.country,
                city: race.Circuit.Location.locality,
                circuit: race.Circuit.circuitName,
            }));
        }

        function matchDriverCode(apiDriver) {
            if (apiDriver.code && DRIVERS[apiDriver.code]) return apiDriver.code;
            for (const [code, info] of Object.entries(DRIVERS)) {
                if (info.name.toLowerCase() === (apiDriver.familyName || "").toLowerCase()) return code;
            }
            return apiDriver.code || "???";
        }

        async function fetchAllResults() {
            const resp = await fetchWithTimeout(`${API_BASE}/${SEASON}/results.json?limit=1000`, 15000);
            if (!resp.ok) throw new Error(`Results API ${resp.status}`);
            const data = await resp.json();
            const byRound = {};
            for (const race of (data.MRData.RaceTable.Races || [])) {
                const round = parseInt(race.round);
                const results = {};
                const dnf = [];
                const positions = [];
                for (const r of race.Results) {
                    const code = matchDriverCode(r.Driver);
                    const pos = parseInt(r.position);
                    const status = r.status || "Finished";
                    const isFinished = status === "Finished" || status === "Lapped" || status.startsWith("+");
                    const isDSQ = status.toLowerCase().includes("disqualified");
                    let pts = 0;
                    if (!isDSQ && pos >= 1 && pos <= 10) pts = F1_POINTS[pos - 1];
                    results[code] = pts;
                    positions.push({ code, position: pos, status, points: pts });
                    if (!isFinished) dnf.push(code);
                }
                byRound[round] = { results, dnf, positions };
            }
            return byRound;
        }

        async function fetchPicks() {
            let csv = null;
            // Try Google Viz endpoint
            try {
                const r = await fetchWithTimeout(SHEETS_VIZ_URL);
                if (r.ok) csv = await r.text();
            } catch (e) {}
            // Try direct export
            if (!csv) try {
                const r = await fetchWithTimeout(SHEETS_CSV_URL);
                if (r.ok) csv = await r.text();
            } catch (e) {}
            // CORS proxies
            if (!csv) for (const proxy of CORS_PROXIES) {
                try {
                    const r = await fetchWithTimeout(proxy(SHEETS_CSV_URL), 12000);
                    if (r.ok) { csv = await r.text(); break; }
                } catch (e) {}
            }
            if (!csv) return null;
            const rows = parseCSV(csv);
            // Column headers vary (trailing ?, spaces, casing). Match flexibly.
            return rows.map(row => {
                const keys = Object.keys(row);
                const find = (pattern) => {
                    const p = pattern.toLowerCase();
                    const k = keys.find(k => k.toLowerCase().replace(/[?\s]+$/g, "") === p
                        || k.toLowerCase().includes(p));
                    return k ? row[k].trim() : "";
                };
                return {
                    timestamp: find("timestamp"),
                    driver1: find("driver pick 1"),
                    driver2: find("driver pick 2"),
                    playerName: find("who are you"),
                };
            });
        }

        // =====================================================================
        // DATA PROCESSING
        // =====================================================================

        function assignPicksToRaces(rawPicks, schedule) {
            if (!rawPicks || !schedule.length) return {};
            const sorted = [...schedule].sort((a, b) => new Date(a.date) - new Date(b.date));
            // Newest picks first so latest submission wins per player+round
            const picks = [...rawPicks].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            const byRound = {};
            for (const pick of picks) {
                const playerId = PLAYER_NAME_MAP[pick.playerName];
                if (!playerId) continue;
                const d1 = DRIVER_NAME_TO_CODE[pick.driver1] || pick.driver1;
                const d2 = DRIVER_NAME_TO_CODE[pick.driver2] || pick.driver2;
                if (!d1 || !d2) continue;
                const pickDate = new Date(pick.timestamp);
                let targetRound = null;
                for (const race of sorted) {
                    if (new Date(race.date) >= pickDate) { targetRound = race.round; break; }
                }
                if (!targetRound) continue;
                if (!byRound[targetRound]) byRound[targetRound] = {};
                if (!byRound[targetRound][playerId]) {
                    byRound[targetRound][playerId] = [d1, d2];
                }
            }
            return byRound;
        }

        function buildRaceData(schedule, resultsByRound, picksByRound) {
            return schedule.map(race => ({
                ...race,
                completed: !!resultsByRound[race.round],
                results: resultsByRound[race.round]?.results || null,
                dnf: resultsByRound[race.round]?.dnf || [],
                positions: resultsByRound[race.round]?.positions || [],
                picks: picksByRound[race.round] || {},
            }));
        }

        function calcPlayerPoints(playerId, races) {
            let total = 0;
            const pointsByRace = [];
            races.forEach(race => {
                if (!race.completed || !race.picks?.[playerId]) { pointsByRace.push(null); return; }
                const rp = race.picks[playerId].reduce((s, d) => s + (race.results?.[d] || 0), 0);
                total += rp;
                pointsByRace.push(total);
            });
            return { total, pointsByRace };
        }

        function getStandings(races) {
            return PLAYERS.map(p => ({ ...p, ...calcPlayerPoints(p.id, races) }))
                .sort((a, b) => b.total - a.total);
        }

        function getDriverUsage(playerId, races) {
            const usage = {};
            Object.keys(DRIVERS).forEach(d => usage[d] = 0);
            races.forEach(race => {
                if (race.completed && race.picks?.[playerId]) {
                    race.picks[playerId].forEach(d => { usage[d] = (usage[d] || 0) + 1; });
                }
            });
            return usage;
        }

        function formatDate(dateStr) {

                    )}
                </div>
            );
        };

        const Sparkline = ({ data, color, width = 120, height = 32 }) => {
            const f = data.filter(d => d !== null);
            if (f.length < 2) return null;
            const max = Math.max(...f, 1);
            const range = max || 1;
            const pts = f.map((v, i) => {
                const x = (i / (f.length - 1)) * width;
                const y = height - (v / range) * (height - 4) - 2;
                return `${x},${y}`;
            }).join(" ");
            return (
                <svg width={width} height={height} style={{ display: "block" }}>
                    <polyline points={pts} fill="none" stroke={color} strokeWidth={2}
                        strokeLinecap="round" strokeLinejoin="round" />
                    <circle cx={width}
                        cy={height - (f[f.length - 1] / range) * (height - 4) - 2}
                        r={3} fill={color} />
                </svg>
            );
        };

        // =====================================================================
        // MAIN APP
        // =====================================================================

        function FantasyF1() {
            const [races, setRaces] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [picksError, setPicksError] = useState(false);
            const [lastUpdated, setLastUpdated] = useState(null);
            const [selectedRace, setSelectedRace] = useState(null);
            const [activeTab, setActiveTab] = useState("standings");
            const raceScroll = useRef(null);

            const loadData = useCallback(async (isRefresh = false) => {
                try {
                    if (!isRefresh) setLoading(true);
                    setError(null);
                    setPicksError(false);

                    // Fetch schedule + results in parallel
                    const [schedule, resultsByRound] = await Promise.all([
                        fetchSchedule(),
                        fetchAllResults().catch(() => ({})),
                    ]);

                    // Fetch picks (non-critical — app works without them)
                    let picksByRound = {};
                    try {
                        const rawPicks = await fetchPicks();
                        if (rawPicks) {
                            picksByRound = assignPicksToRaces(rawPicks, schedule);
                        } else {
                            setPicksError(true);
                        }
                    } catch (e) {
                        setPicksError(true);
                    }

                    const raceData = buildRaceData(schedule, resultsByRound, picksByRound);
                    setRaces(raceData);
                    setLastUpdated(new Date());

                    // Default selected race: last completed, or first
                    if (!isRefresh) {
                        const lastCompleted = [...raceData].reverse().find(r => r.completed);
                        setSelectedRace(lastCompleted?.round || 1);
                    }
                } catch (e) {
                    setError(e.message || "Failed to load data");
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => { loadData(); }, [loadData]);
            useEffect(() => {
                const id = setInterval(() => loadData(true), REFRESH_MS);
                return () => clearInterval(id);
            }, [loadData]);

            useEffect(() => {
                if (raceScroll.current) {
                    const el = raceScroll.current.querySelector('[data-active="true"]');
                    el?.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
                }
            }, [selectedRace]);

            const standings = useMemo(() => getStandings(races), [races]);
            const leader = standings[0];
            const completedRaces = races.filter(r => r.completed);
            const currentRace = races.find(r => r.round === selectedRace);
            const nextRace = races.find(r => !r.completed);

            // --- LOADING SCREEN ---
            if (loading) {
                return (
                    <div style={{ minHeight: "100vh", background: t.bg, display: "flex",
                        flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
                        <div style={{ width: 32, height: 32, border: `3px solid ${t.border}`,
                            borderTopColor: t.accent, borderRadius: "50%",
                            animation: "spin 0.8s linear infinite" }} />
                        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14,
                            color: t.textDim, letterSpacing: "0.1em", textTransform: "uppercase",
                            animation: "pulse 1.5s ease-in-out infinite" }}>
                            Loading race data...
                        </div>
                    </div>
                );
            }

            // --- ERROR SCREEN ---
            if (error && races.length === 0) {
                return (
                    <div style={{ minHeight: "100vh", background: t.bg, display: "flex",
                        flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, padding: 24 }}>
                        <div style={{ fontSize: 36 }}>&#9888;&#65039;</div>
                        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 16,
                            color: t.accent, letterSpacing: "0.06em" }}>Failed to load data</div>
                        <div style={{ fontSize: 13, color: t.textDim, textAlign: "center" }}>{error}</div>
                        <button onClick={() => loadData()} style={{
                            marginTop: 8, padding: "10px 24px", background: t.accent, color: "#fff",
                            border: "none", borderRadius: 6, fontFamily: "'Oswald', sans-serif",
                            fontSize: 13, fontWeight: 600, letterSpacing: "0.08em",
                            textTransform: "uppercase", cursor: "pointer",
                        }}>Retry</button>
                    </div>
                );
            }

            // --- MAIN UI ---
            return (
                <div style={{ minHeight: "100vh", background: t.bg, color: t.text,
                    fontFamily: "'DM Sans', sans-serif" }}>

                    {/* HEADER */}
                    <div style={{ background: `linear-gradient(135deg, ${t.surface} 0%, #1a0a0a 100%)`,
                        borderBottom: `1px solid ${t.border}`, padding: "20px 24px 16px" }}>
                        <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 4 }}>
                            <h1 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 28, fontWeight: 700,
                                letterSpacing: "0.08em", textTransform: "uppercase", margin: 0, color: "#fff" }}>
                                Fantasy F1
                            </h1>
                            <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 16, fontWeight: 300,
                                color: t.accent, letterSpacing: "0.15em" }}>{SEASON}</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: t.textDim }}>
                            <span>{completedRaces.length} of {races.length} races completed</span>
                            {picksError && (
                                <span style={{ color: "#ff8800", fontSize: 11 }}>
                                    &#183; Picks unavailable
                                </span>
                            )}
                        </div>
                        <div style={{ marginTop: 12, height: 3, background: t.border,
                            borderRadius: 2, overflow: "hidden" }}>
                            <div style={{ height: "100%",
                                width: `${(completedRaces.length / (races.length || 1)) * 100}%`,
                                background: `linear-gradient(90deg, ${t.accent}, #ff4444)`,
                                borderRadius: 2 }} />
                        </div>
                        {nextRace && (
                            <div style={{ marginTop: 10, fontSize: 12, color: t.textDim }}>
                                Next: <span style={{ color: t.text, fontWeight: 500 }}>
                                    {nextRace.flag} {nextRace.name}
                                </span>
                                <span style={{ marginLeft: 6 }}>{formatDate(nextRace.date)}</span>
                            </div>
                        )}
                    </div>

                    {/* TABS */}
                    <div style={{ display: "flex", borderBottom: `1px solid ${t.border}`, background: t.surface }}>
                        {["standings", "races", "usage"].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} style={{
                                flex: 1, padding: "12px 16px", background: "none", border: "none",
                                borderBottom: activeTab === tab ? `2px solid ${t.accent}` : "2px solid transparent",
                                color: activeTab === tab ? "#fff" : t.textDim,
                                fontFamily: "'Oswald', sans-serif", fontSize: 13,
                                fontWeight: activeTab === tab ? 600 : 400,
                                letterSpacing: "0.12em", textTransform: "uppercase", cursor: "pointer",
                            }}>{tab}</button>
                        ))}
                    </div>

                    {/* CONTENT */}
                    <div style={{ padding: "16px 16px 32px" }}>

                        {/* ── STANDINGS ── */}
                        {activeTab === "standings" && (
                            <div>
                                {standings.map((p, idx) => {
                                    const gap = idx === 0 ? null : p.total - leader.total;
                                    const lastRace = completedRaces[completedRaces.length - 1];
                                    const lastPicks = lastRace?.picks?.[p.id] || [];
                                    const lastRacePts = lastPicks.reduce(
                                        (s, d) => s + (lastRace?.results?.[d] || 0), 0);
                                    return (
                                        <div key={p.id} style={{
                                            background: t.surface,
                                            border: `1px solid ${idx === 0 ? p.color + "60" : t.border}`,
                                            borderRadius: 8, padding: "16px 18px", marginBottom: 10,
                                            position: "relative", overflow: "hidden",
                                        }}>
                                            <div style={{ position: "absolute", top: 0, left: 0,
                                                bottom: 0, width: 4, background: p.color }} />
                                            <div style={{ display: "flex", justifyContent: "space-between",
                                                alignItems: "flex-start" }}>
                                                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                                    <div style={{ fontFamily: "'Oswald', sans-serif",
                                                        fontSize: 32, fontWeight: 700,
                                                        color: idx === 0 ? p.color : t.textMuted,
                                                        lineHeight: 1, width: 32, textAlign: "center" }}>
                                                        {idx + 1}
                                                    </div>
                                                    <div>
                                                        <div style={{ fontFamily: "'Oswald', sans-serif",
                                                            fontSize: 18, fontWeight: 600,
                                                            letterSpacing: "0.06em",
                                                            textTransform: "uppercase", color: "#fff" }}>
                                                            {p.name}
                                                        </div>
                                                        <div style={{ fontSize: 11, color: t.textDim, marginTop: 2 }}>
                                                            {gap !== null ? `${gap} pts from leader` : "LEADER"}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div style={{ textAlign: "right" }}>
                                                    <div style={{ fontFamily: "'Oswald', sans-serif",
                                                        fontSize: 36, fontWeight: 700, color: "#fff",
                                                        lineHeight: 1 }}>{p.total}</div>
                                                    <div style={{ fontSize: 11,
                                                        color: lastRacePts > 0 ? t.positive : t.textMuted,
                                                        fontWeight: 600, marginTop: 4 }}>
                                                        {lastRace ? `R${lastRace.round}: +${lastRacePts}` : ""}
                                                    </div>
                                                </div>
                                            </div>
                                            {lastRace && lastPicks.length > 0 && (
                                                <div style={{ display: "flex", gap: 6, marginTop: 12,
                                                    flexWrap: "wrap" }}>
                                                    {lastPicks.map(d => (
                                                        <DriverChip key={d} code={d} showPoints
                                                            raceResults={lastRace.results} size="sm" />
                                                    ))}
                                                </div>
                                            )}
                                            {p.pointsByRace.filter(v => v !== null).length >= 2 && (
                                                <div style={{ marginTop: 12 }}>
                                                    <Sparkline data={p.pointsByRace} color={p.color}
                                                        width={200} height={28} />
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* ── RACES ── */}
                        {activeTab === "races" && (
                            <div>
                                <div ref={raceScroll} style={{ display: "flex", gap: 6,
                                    overflowX: "auto", paddingBottom: 12, marginBottom: 16,
                                    scrollbarWidth: "none" }}>
                                    {races.map(race => (
                                        <button key={race.round}
                                            data-active={race.round === selectedRace ? "true" : "false"}
                                            onClick={() => setSelectedRace(race.round)}
                                            style={{
                                                flexShrink: 0, padding: "8px 12px", borderRadius: 6,
                                                border: race.round === selectedRace
                                                    ? `1px solid ${t.accent}` : `1px solid ${t.border}`,
                                                background: race.round === selectedRace
                                                    ? `${t.accent}20` : t.surface,
                                                color: race.completed ? "#fff" : t.textMuted,
                                                fontFamily: "'Oswald', sans-serif", fontSize: 12,
                                                fontWeight: race.round === selectedRace ? 600 : 400,
                                                letterSpacing: "0.06em", textTransform: "uppercase",
                                                cursor: "pointer", display: "flex", flexDirection: "column",
                                                alignItems: "center", gap: 2, minWidth: 56,
                                                opacity: race.completed ? 1 : 0.5,
                                            }}>
                                            <span style={{ fontSize: 16 }}>{race.flag}</span>
                                            <span>R{race.round}</span>
                                        </button>
                                    ))}
                                </div>

                                {currentRace && (
                                    <div>
                                        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 20,
                                            fontWeight: 600, letterSpacing: "0.06em",
                                            textTransform: "uppercase", marginBottom: 4 }}>
                                            {currentRace.flag} {currentRace.name}
                                        </div>
                                        <div style={{ fontSize: 12, color: t.textDim, marginBottom: 16 }}>
                                            Round {currentRace.round} of {races.length}
                                            {" "}&#183;{" "}{formatDate(currentRace.date)}
                                            {!currentRace.completed && " \u00b7 UPCOMING"}
                                        </div>

                                        {currentRace.completed ? (
                                            <>
                                                {/* Player scores for this race */}
                                                {[...PLAYERS]
                                                    .map(player => {
                                                        const picks = currentRace.picks?.[player.id] || [];
                                                        const raceTotal = picks.reduce(
                                                            (s, d) => s + (currentRace.results?.[d] || 0), 0);
                                                        return { ...player, picks, raceTotal };
                                                    })
                                                    .sort((a, b) => b.raceTotal - a.raceTotal)
                                                    .map(player => (
                                                        <div key={player.id} style={{
                                                            background: t.surface,
                                                            border: `1px solid ${t.border}`,
                                                            borderRadius: 6, padding: "12px 14px",
                                                            marginBottom: 8,
                                                        }}>
                                                            <div style={{ display: "flex",
                                                                justifyContent: "space-between",
                                                                alignItems: "center", marginBottom: 8 }}>
                                                                <div style={{ display: "flex",
                                                                    alignItems: "center", gap: 8 }}>
                                                                    <div style={{ width: 8, height: 8,
                                                                        borderRadius: "50%",
                                                                        background: player.color }} />
                                                                    <span style={{
                                                                        fontFamily: "'Oswald', sans-serif",
                                                                        fontSize: 14, fontWeight: 500,
                                                                        letterSpacing: "0.06em",
                                                                        textTransform: "uppercase" }}>
                                                                        {player.name}
                                                                    </span>
                                                                </div>
                                                                <span style={{
                                                                    fontFamily: "'Oswald', sans-serif",
                                                                    fontSize: 20, fontWeight: 700,
                                                                    color: player.raceTotal > 0 ? "#fff" : t.textMuted,
                                                                }}>+{player.raceTotal}</span>
                                                            </div>
                                                            <div style={{ display: "flex", gap: 6,
                                                                flexWrap: "wrap" }}>
                                                                {player.picks.length > 0
                                                                    ? player.picks.map(d => (
                                                                        <DriverChip key={d} code={d}
                                                                            showPoints
                                                                            raceResults={currentRace.results} />
                                                                    ))
                                                                    : <span style={{ fontSize: 11,
                                                                        color: t.textMuted,
                                                                        fontStyle: "italic" }}>
                                                                        No picks submitted
                                                                    </span>
                                                                }
                                                            </div>
                                                        </div>
                                                    ))}

                                                {/* Race classification */}
                                                <div style={{ marginTop: 20,
                                                    fontFamily: "'Oswald', sans-serif", fontSize: 13,
                                                    fontWeight: 500, letterSpacing: "0.1em",
                                                    textTransform: "uppercase", color: t.textDim,
                                                    marginBottom: 8 }}>Race Classification</div>
                                                <div style={{ background: t.surface,
                                                    border: `1px solid ${t.border}`, borderRadius: 6,
                                                    overflow: "hidden" }}>
                                                    {[...currentRace.positions]
                                                        .sort((a, b) => a.position - b.position)
                                                        .map(p => {
                                                            const driver = DRIVERS[p.code];
                                                            const isDNF = currentRace.dnf?.includes(p.code);
                                                            return (
                                                                <div key={p.code} style={{
                                                                    display: "flex", alignItems: "center",
                                                                    padding: "8px 14px",
                                                                    borderBottom: `1px solid ${t.border}`,
                                                                    opacity: isDNF ? 0.4 : 1,
                                                                }}>
                                                                    <span style={{ width: 28,
                                                                        fontFamily: "'Oswald', sans-serif",
                                                                        fontSize: 12,
                                                                        color: p.points > 0 ? t.text : t.textMuted,
                                                                        fontWeight: 500 }}>
                                                                        {isDNF ? "DNF" : `P${p.position}`}
                                                                    </span>
                                                                    <span style={{ width: 8, height: 8,
                                                                        borderRadius: "50%",
                                                                        background: getTeamColor(p.code),
                                                                        marginRight: 8, flexShrink: 0 }} />
                                                                    <span style={{ flex: 1,
                                                                        fontFamily: "'Oswald', sans-serif",
                                                                        fontSize: 13, fontWeight: 400,
                                                                        letterSpacing: "0.04em",
                                                                        textTransform: "uppercase",
                                                                        color: p.points > 0 ? "#fff" : t.textMuted }}>
                                                                        {p.code}{" "}
                                                                        <span style={{ color: t.textDim,
                                                                            fontWeight: 300 }}>
                                                                            {driver?.name}
                                                                        </span>
                                                                    </span>
                                                                    <span style={{
                                                                        fontFamily: "'Oswald', sans-serif",
                                                                        fontSize: 14, fontWeight: 600,
                                                                        color: p.points > 0 ? "#fff" : t.textMuted,
                                                                        minWidth: 30, textAlign: "right" }}>
                                                                        {p.points > 0 ? p.points : "\u2013"}
                                                                    </span>
                                                                </div>
                                                            );
                                                        })}
                                                </div>
                                            </>
                                        ) : (
                                            <div style={{ background: t.surface,
                                                border: `1px solid ${t.border}`, borderRadius: 8,
                                                padding: "32px 20px", textAlign: "center" }}>
                                                <div style={{ fontSize: 32, marginBottom: 8 }}>
                                                    {currentRace.flag}
                                                </div>
                                                <div style={{ fontFamily: "'Oswald', sans-serif",
                                                    fontSize: 14, color: t.textDim,
                                                    letterSpacing: "0.1em",
                                                    textTransform: "uppercase", marginBottom: 4 }}>
                                                    {formatDate(currentRace.date)}
                                                </div>
                                                <div style={{ fontFamily: "'Oswald', sans-serif",
                                                    fontSize: 12, color: t.textMuted,
                                                    letterSpacing: "0.08em",
                                                    textTransform: "uppercase", marginBottom: 16 }}>
                                                    {currentRace.circuit} &#183; {currentRace.city}
                                                </div>

                                                {/* Show submitted picks for upcoming race */}
                                                {Object.keys(currentRace.picks).length > 0 && (
                                                    <div style={{ marginTop: 8, textAlign: "left" }}>
                                                        <div style={{ fontFamily: "'Oswald', sans-serif",
                                                            fontSize: 11, color: t.textDim,
                                                            letterSpacing: "0.1em",
                                                            textTransform: "uppercase",
                                                            marginBottom: 8, textAlign: "center" }}>
                                                            Picks Submitted
                                                        </div>
                                                        {PLAYERS.map(player => {
                                                            const picks = currentRace.picks[player.id];
                                                            if (!picks) return null;
                                                            return (
                                                                <div key={player.id} style={{
                                                                    display: "flex", alignItems: "center",
                                                                    gap: 8, padding: "6px 12px",
                                                                    marginBottom: 4,
                                                                }}>
                                                                    <div style={{ width: 6, height: 6,
                                                                        borderRadius: "50%",
                                                                        background: player.color }} />
                                                                    <span style={{
                                                                        fontFamily: "'Oswald', sans-serif",
                                                                        fontSize: 12, fontWeight: 500,
                                                                        letterSpacing: "0.06em",
                                                                        textTransform: "uppercase",
                                                                        width: 70 }}>
                                                                        {player.name}
                                                                    </span>
                                                                    <div style={{ display: "flex", gap: 4 }}>
                                                                        {picks.map(d => (
                                                                            <DriverChip key={d} code={d}
                                                                                size="sm" />
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── USAGE ── */}
                        {activeTab === "usage" && (
                            <div>
                                <div style={{ fontSize: 12, color: t.textDim, marginBottom: 16,
                                    lineHeight: 1.5 }}>
                                    Each driver can be picked max 3x per season. All 22 must be used at least once.
                                </div>
                                {PLAYERS.map(player => {
                                    const usage = getDriverUsage(player.id, races);
                                    const teamEntries = Object.entries(TEAMS);
                                    return (
                                        <div key={player.id} style={{ marginBottom: 20 }}>
                                            <div style={{ display: "flex", alignItems: "center",
                                                gap: 8, marginBottom: 10 }}>
                                                <div style={{ width: 8, height: 8, borderRadius: "50%",
                                                    background: player.color }} />
                                                <span style={{ fontFamily: "'Oswald', sans-serif",
                                                    fontSize: 15, fontWeight: 600,
                                                    letterSpacing: "0.06em",
                                                    textTransform: "uppercase" }}>
                                                    {player.name}
                                                </span>
                                                <span style={{ fontSize: 11, color: t.textDim }}>
                                                    {Object.values(usage).filter(v => v > 0).length}/22 drivers used
                                                </span>
                                            </div>
                                            <div style={{ display: "grid",
                                                gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))",
                                                gap: 4 }}>
                                                {teamEntries.map(([teamName, team]) =>
                                                    team.drivers.map(code => {
                                                        const count = usage[code] || 0;
                                                        const maxed = count >= 3;
                                                        return (
                                                            <div key={code} style={{
                                                                display: "flex", alignItems: "center",
                                                                gap: 6, padding: "6px 10px",
                                                                background: maxed
                                                                    ? `${t.negative}15` : t.surface,
                                                                border: `1px solid ${maxed
                                                                    ? t.negative + "40" : t.border}`,
                                                                borderRadius: 4,
                                                            }}>
                                                                <span style={{ width: 6, height: 6,
                                                                    borderRadius: "50%",
                                                                    background: team.color,
                                                                    flexShrink: 0 }} />
                                                                <span style={{
                                                                    fontFamily: "'Oswald', sans-serif",
                                                                    fontSize: 11, fontWeight: 500,
                                                                    letterSpacing: "0.05em",
                                                                    textTransform: "uppercase",
                                                                    color: count === 0
                                                                        ? t.textMuted : t.text,
                                                                    flex: 1 }}>
                                                                    {code}
                                                                </span>
                                                                <div style={{ display: "flex", gap: 2 }}>
                                                                    {[0, 1, 2].map(i => (
                                                                        <div key={i} style={{
                                                                            width: 8, height: 8,
                                                                            borderRadius: 2,
                                                                            background: i < count
                                                                                ? (maxed ? t.negative : team.color)
                                                                                : `${t.textMuted}30`,
                                                                        }} />
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        );
                                                    })
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    {/* FOOTER */}
                    <div style={{ padding: "16px 24px", borderTop: `1px solid ${t.border}`,
                        textAlign: "center", fontSize: 10, color: t.textMuted,
                        letterSpacing: "0.1em", textTransform: "uppercase",
                        fontFamily: "'Oswald', sans-serif" }}>
                        {completedRaces.length > 0
                            ? `Updated after Round ${completedRaces.length} \u00b7 ${completedRaces[completedRaces.length - 1]?.name} GP`
                            : "Season not started"}
                        {lastUpdated && (
                            <span style={{ display: "block", marginTop: 4, fontSize: 9,
                                color: t.textMuted }}>
                                Data refreshed {lastUpdated.toLocaleTimeString()}
                                {" "}\u00b7 Auto-refresh every 5 min
                            </span>
                        )}
                    </div>
                </div>
            );
        }

        // =====================================================================
        // RENDER
        // =====================================================================

        ReactDOM.createRoot(document.getElementById("root")).render(
            React.createElement(FantasyF1)
        );
    </script>
</body>
</html>
